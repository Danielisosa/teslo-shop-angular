<h1 class="text-2xl font-bold ds-title-gradient">Listado de Productos</h1>
<h3 class="text-lg">Total de Productos
  <span class="text-accent">{{ productsResource.value()?.count }}</span>
</h3>

<div class="divider"></div>
<div class="flex gap-2 items-center h-20">

<h3 class="text-lg">Registros por página</h3>
  <select class="select ds-select w-32"
  aria-label="Registros por página"
  (change)="productPerPage.set(+selectPerPage.value)" #selectPerPage>
    <option value="10">10</option>
    <option value="20">20</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>
  <div class="flex flex-1"></div>

  <button class="ds-btn ds-btn--accent" routerLink="/admin/products/new">Nuevo Producto</button>
</div>

<product-table [products]="productsResource.value()?.products ?? []"/>
<div class="flex justify-end">
 <app-pagination class="m-4 "
  [pages]="productsResource.value()?.pages ?? 0"
  [currentPage]="paginationService.currentPage()"
  />
</div>
