<form class="flex flex-col gap-2 " [formGroup]="registerForm" (ngSubmit)="onSubmit()">
   <label class="input input-bordered flex items-center gap-2">
      <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
         <g
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-width="2.5"
          fill="none"
          stroke="currentColor"><path d="M320 312C386.3 312 440 258.3 440 192C440 125.7 386.3 72 320 72C253.7 72 200 125.7 200 192C200 258.3 253.7 312 320 312zM290.3 368C191.8 368 112 447.8 112 546.3C112 562.7 125.3 576 141.7 576L498.3 576C514.7 576 528 562.7 528 546.3C528 447.8 448.2 368 349.7 368L290.3 368z"/>
      </g>
      </svg>
      <input
      type="text"
      class="grow ds-input"
      [class.ds-input--error]="registerForm.get('fullName')?.errors && registerForm.get('fullName')?.touched"
      placeholder="Nombre de usuario"
      formControlName="fullName"
       />
    </label>
    <form-error-label [control]="registerForm.get('fullName')!"/>
  <label class="input input-bordered flex items-center gap-2">
      <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <g
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-width="2.5"
          fill="none"
          stroke="currentColor"
        >
          <rect width="20" height="16" x="2" y="4" rx="2"></rect>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
        </g>
      </svg>
      <input
      type="text"
      class="grow ds-input"
      [class.ds-input--error]="registerForm.get('email')?.errors && registerForm.get('email')?.touched"
      placeholder="Correo Electrónico"
      formControlName="email"
       />
    </label>
    <form-error-label [control]="registerForm.get('email')!"/>

 <label class="input validator">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <path
        d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"
      ></path>
      <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
    </g>
  </svg>
  <input
    type="password"
    class="grow ds-input"
    [class.ds-input--error]="registerForm.get('password')?.errors && registerForm.get('password')?.touched"
    placeholder="Contraseña"
    formControlName="password"

  />
</label>
<form-error-label [control]="registerForm.get('password')!"/>
<button class="ds-btn ds-btn--accent" type="submit">Registrar cuenta</button>


<p class="text-slate-400">Ya tienes cuenta?
  <a routerLink="/auth/login" class="ds-title-gradient">Inicia sesión aqui</a>
</p>

</form>

@if(hasError()){
  <div role="alert" class="alert alert-error animate-fadeIn fixed bottom-5 right-5 w-52">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
  </svg>
  <span>Por favor revise la informacion ingresada</span>
</div>
}
